<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="cake" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbcfe8"/>
      <stop offset="100%" style="stop-color:#f9a8d4"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角方形 -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- 像素蛋糕 -->
  <rect x="64" y="120" width="128" height="48" rx="8" fill="url(#cake)"/>
  <rect x="80" y="80" width="96" height="48" rx="8" fill="url(#cake)" opacity="0.9"/>
  <rect x="96" y="48" width="64" height="40" rx="8" fill="url(#cake)" opacity="0.8"/>
  <!-- 像素点装饰 -->
  <rect x="72" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="88" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="104" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="120" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="136" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="152" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <rect x="168" y="104" width="8" height="8" fill="#ec4899" opacity="0.6"/>
  <!-- 星星 -->
  <circle cx="200" cy="60" r="6" fill="white" opacity="0.8"/>
  <circle cx="56" cy="80" r="4" fill="white" opacity="0.6"/>
  <circle cx="190" cy="100" r="3" fill="white" opacity="0.5"/>
  <circle cx="60" cy="160" r="5" fill="white" opacity="0.7"/>
  <!-- AI 文字 -->
  <text x="128" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" opacity="0.9">AI</text>
</svg>
